[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cargo-compliance-env"
version = "0.1.0"
description = "DeAI Dispatcher: Autonomous Cargo Compliance Environment"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "Joel Jose", email = "your-email@example.com" }
]
dependencies = [
    "fastapi",
    "uvicorn",
    "openai",
    "groq",
    "python-dotenv",
    "tenacity",
    "pydantic"
]

[project.optional-dependencies]
dev = ["pytest", "black"]

[tool.setuptools.packages.find]
where = ["."]