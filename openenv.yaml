name: Cargo Compliance Environment

description: >
  A bilateral cargo compliance benchmark where an LLM agent acts as a
  customs broker, extracting shipment details and selecting the correct
  regulatory framework for both origin (export) and destination (import).

version: "1.0.0"
author: JoelJose23

observation_space:
  type: text
  description: >
    Shipment manifest with extraction state, available laws, documents,
    and regulators for bilateral compliance verification.

action_space:
  type: discrete
  actions:
    - fetch_info
    - submit_extract
    - pick_law
    - final_verdict
  description: >
    Multi-phase compliance actions across extraction, law selection, and audit.

endpoints:
  health: /health
  reset: /reset
  step: /step
  state: /state

tasks:
  - id: cargo_food
    description: >
      Complete bilateral food-compliance screening for an agricultural
      shipment. Extract qty, category, origin, destination and select
      the exact food import/export laws, regulator, and documents.
    steps: 5
    ideal_action: final_verdict

  - id: cargo_electronics
    description: >
      Resolve export-control obligations for a dual-use electronics
      shipment. Identify origin/destination and choose the matching
      electronics compliance package without extra laws.
    steps: 5
    ideal_action: final_verdict

  - id: cargo_pharma
    description: >
      Validate pharmaceutical API compliance across origin and destination
      jurisdictions. Select the exact controlled-substance paperwork
      without hallucinating extra laws.
    steps: 5
    ideal_action: final_verdict

scoring:
  reward_range: [0.0, 1.0]
  success_threshold: 0.70
  score_formula: grader_score

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2
