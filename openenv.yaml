version: "1.0"
name: "cargo-compliance-challenge"
benchmark: "CargoComplianceEnv"

# 1. Execution Settings
entrypoint: "python3 i.py"
timeout: 300 # 5 minutes per episode
memory_limit: "4Gi"

# 2. Environment Configuration
env_vars:
  API_BASE_URL: "https://api-inference.huggingface.co/v1"
  MODEL_NAME: "Qwen/Qwen2.5-72B-Instruct"
  WORLD_ENV_URL: "https://SSETHackathonTeam-cargo-compliance-env.hf.space"
  MY_ENV_V4_TASK: "cargo-compliance"
  MY_ENV_V4_BENCHMARK: "CargoComplianceEnv"
  # Provide either HF_TOKEN or API_KEY in Secrets. i.py accepts both.
  HF_TOKEN: "${HF_TOKEN}"
  API_KEY: "${API_KEY}"

# 3. Build Requirements
build:
  python_version: "3.11"
  requirements: "requirements.txt"
  # If your environment requires a specific Docker base:
  image: "python:3.11-slim"

# 4. Evaluation Metrics
metrics:
  - name: "total_reward"
    goal: "maximize"
  - name: "success_rate"
    goal: "maximize"
